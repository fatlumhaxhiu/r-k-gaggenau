version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: rk-gaggenau-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rkadmin
      POSTGRES_PASSWORD: rkpassword123
      POSTGRES_DB: rk_gaggenau
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
